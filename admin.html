<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    padding: 20px 10px;
    background:#f5f7fa;
    font-family:Arial;
    max-width: 100vw;
    overflow-x: hidden;
  }
  .login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
    width: 90%;
  }
  .login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
  }
  .login button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
  }
  .container{
    display:none;
    max-width: none;
    width: 98%;
    margin: 0 auto;
    background:white;
    padding:20px 15px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
  }
  h1{
    margin-bottom:5px;
    text-align:center;
    font-size: 20px;
  }
  /* 新增：状态说明文字样式（带颜色图标） */
  .status-desc {
    text-align: left;
    font-size: 14px;
    color: #333;
    margin-bottom: 8px;
    padding-left: 5px;
    line-height: 1.6;
  }
  /* 颜色图标样式 */
  .color-tag {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .tag-white {
    background-color: #ffffff;
    border: 1px solid #ddd;
  }
  .tag-blue {
    background-color: #e6f7ff;
  }
  .tag-red {
    background-color: #fff2f0;
  }
  /* 新增：数据库修改说明文字 */
  .db-modify-desc {
    text-align: left;
    font-size: 13px;
    color: #666;
    margin-bottom: 15px;
    padding-left: 5px;
    line-height: 1.5;
  }
  .search-tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-tools input{
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    width:200px;
  }
  .search-tools button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  .tools{
    display:flex;
    gap:8px; /* 缩小按钮间隔，不要太远 */
    margin-bottom:15px;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
  }
  button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  button.del-btn{background:#dc3545}
  button.exit-btn{background:#6c757d}
  .table-container{
    overflow-x: auto;
    margin:10px 0;
  }
  table{
    width:100%;
    min-width: 1400px;
    border-collapse:collapse;
  }
  th,td{
    border:1px solid #ddd;
    padding:8px 6px;
    text-align:center;
    white-space:nowrap;
    font-size:13px;
  }
  th{background:#f8f9fa}
  .id-col{width:80px}
  .time-col{width:150px}
  .name-col{width:80px}
  .phone-col{width:110px}
  .paytype-col{width:100px}
  .pay-record-col{width: 250px;}
  .money-col{width:80px}
  .oper-col{width:80px}
  .class-col{width:120px}
  .remark-col{width:150px}
  /* 支付记录换行显示 */
  .pay-record {
    white-space: pre-line;
    text-align: left;
    padding: 5px;
    line-height: 1.4;
  }
  /* 行标色样式 */
  .row-multiple {
    background-color: #e6f7ff; /* 蓝色：多次提交 */
  }
  .row-modified {
    background-color: #fff2f0; /* 红色：手动修改 */
  }
</style>
</head>

<body>
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <!-- 优化1：带颜色图标的状态说明 -->
  <div class="status-desc">
    <span class="color-tag tag-white"></span>白色：只提交一次　
    <span class="color-tag tag-blue"></span>蓝色：多次提交　
    <span class="color-tag tag-red"></span>红色：班次有修改
  </div>
  <!-- 优化2：新增数据库修改说明文字 -->
  <div class="db-modify-desc">
    在数据库中手动修改某条订单的班次后，需要把该订单的 isModified 字段设为 true，这样后台页面就会标红
  </div>
  <div class="search-tools">
    <input type="text" id="searchName" placeholder="姓名查询">
    <input type="text" id="searchPhone" placeholder="电话查询">
    <button onclick="searchOrders()">查询</button>
    <button onclick="resetSearch()">重置</button>
  </div>
  <div class="tools">
    <!-- 优化3：导出Excel按钮在刷新右侧，间隔8px（不远） -->
    <div style="display: flex; gap: 8px;">
      <button onclick="load()">刷新</button>
      <button onclick="exportExcel()">导出Excel</button>
    </div>
    <button class="exit-btn" onclick="logout()">退出</button>
  </div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="id-col">订单ID</th>
          <th class="name-col">姓名</th>
          <th class="phone-col">电话</th>
          <th class="paytype-col">最后支付方式</th>
          <th class="pay-record-col">支付记录（每一笔）</th>
          <th class="money-col">总金额</th>
          <th class="time-col">最后提交时间</th>
          <th class="class-col">4月11日早送</th>
          <th class="class-col">4月11日晚接</th>
          <th class="class-col">4月12日早送</th>
          <th class="class-col">4月12日晚接</th>
          <th class="class-col">4月11日中午更换</th>
          <th class="class-col">4月12日中午更换</th>
          <th class="oper-col">操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
// 核心配置
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";
let orderData = [];
let filteredOrderData = [];

// 固定班次排序
const FIXED_CAR_ORDER = [
    '4月11日早送',
    '4月11日晚接',
    '4月12日早送',
    '4月12日晚接',
    '4月11日中午考点更换',
    '4月12日中午考点更换'
];

// 登录函数
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){
    alert('密码错误');
    return;
  }
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出登录
function logout(){
  if(confirm('确定退出？')){
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
  }
}

// 加载所有订单
async function load() {
  try {
    const res = await fetch(`${SERVER_URL}/api/getAllOrders?pwd=${PWD}`);
    const data = await res.json();
    if(data.code !== 0) { 
      alert(data.msg); 
      return; 
    }
    orderData = data.data;
    filteredOrderData = [...orderData];
    renderTable();
  } catch (err) {
    alert('加载失败：' + err.message);
  }
}

// 渲染订单表格
function renderTable() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  
  if(filteredOrderData.length === 0) {
    list.innerHTML = '<tr><td colspan="14">暂无数据</td></tr>';
    return;
  }
  
  filteredOrderData.forEach(order => {
    const tr = document.createElement('tr');
    
    // 行标色逻辑
    if(order.isModified) {
      tr.className = 'row-modified'; // 红色：手动修改
    } else if(order.submitCount && order.submitCount > 1) {
      tr.className = 'row-multiple'; // 蓝色：多次提交
    }
    
    // 封装获取班次信息的函数（按固定顺序）
    const getClassInfo = (name) => {
      const item = order.carList.find(i => i.name === name);
      if(!item) return '-';
      if(item.school) return item.school;
      if(item.from && item.to) return `${item.from}→${item.to}`;
      return '-';
    };

    // 格式化支付记录
    const formatPaymentRecords = () => {
      if(!order.paymentRecords || order.paymentRecords.length === 0) return '-';
      return order.paymentRecords.map((record, index) => {
        return `第${index+1}笔：${record.payType} ${record.amount}元 ${record.time}`;
      }).join('\n');
    };
    
    tr.innerHTML = `
      <td>${order.orderId || '-'}</td>
      <td>${order.userName || '-'}</td>
      <td>${order.userPhone || '-'}</td>
      <td>${order.payType || '-'}</td>
      <td class="pay-record">${formatPaymentRecords()}</td>
      <td>${order.total || 0}</td>
      <td>${order.createTime || '-'}</td>
      <td>${getClassInfo('4月11日早送')}</td>
      <td>${getClassInfo('4月11日晚接')}</td>
      <td>${getClassInfo('4月12日早送')}</td>
      <td>${getClassInfo('4月12日晚接')}</td>
      <td>${getClassInfo('4月11日中午考点更换')}</td>
      <td>${getClassInfo('4月12日中午考点更换')}</td>
      <td><button class="del-btn" onclick="deleteOrder('${order._id}')">删除</button></td>
    `;
    list.appendChild(tr);
  });
}

// 删除订单
async function deleteOrder(id) {
  if(!confirm('确定删除该订单？')) return;
  try {
    const res = await fetch(`${SERVER_URL}/api/deleteOrder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: PWD, id })
    });
    const data = await res.json();
    alert(data.msg);
    load();
  } catch (err) {
    alert('删除失败：' + err.message);
  }
}

// 搜索订单
function searchOrders() {
  const name = document.getElementById('searchName').value.trim();
  const phone = document.getElementById('searchPhone').value.trim();
  
  filteredOrderData = orderData.filter(o => 
    (o.userName || '').includes(name) && 
    (o.userPhone || '').includes(phone)
  );
  renderTable();
}

// 重置搜索
function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = [...orderData];
  renderTable();
}

// 导出Excel
function exportExcel() {
  if(filteredOrderData.length === 0) { 
    alert('暂无数据可导出'); 
    return; 
  }
  
  const excelData = filteredOrderData.map(o => {
    const getInfo = (n) => {
      const i = o.carList.find(x=>x.name===n);
      if(!i) return '-';
      if(i.school) return i.school;
      if(i.from&&i.to) return i.from+'→'+i.to;
      return '-';
    };

    const getPaymentRecords = () => {
      if(!o.paymentRecords || o.paymentRecords.length === 0) return '-';
      return o.paymentRecords.map((r, i) => `第${i+1}笔：${r.payType} ${r.amount}元 ${r.time}`).join('；');
    };

    return {
      订单ID: o.orderId || '-',
      姓名: o.userName || '-',
      电话: o.userPhone || '-',
      最后支付方式: o.payType || '-',
      支付记录: getPaymentRecords(),
      总金额: o.total || 0,
      最后提交时间: o.createTime || '-',
      '4月11日早送': getInfo('4月11日早送'),
      '4月11日晚接': getInfo('4月11日晚接'),
      '4月12日早送': getInfo('4月12日早送'),
      '4月12日晚接': getInfo('4月12日晚接'),
      '4月11日中午更换': getInfo('4月11日中午考点更换'),
      '4月12日中午更换': getInfo('4月12日中午考点更换'),
      提交次数: o.submitCount || 1,
      是否手动修改: o.isModified ? '是' : '否'
    };
  });
  
  const ws = XLSX.utils.json_to_sheet(excelData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '订单列表');
  XLSX.writeFile(wb, `订单列表_${new Date().toLocaleDateString()}.xlsx`);
}
</script>
</body>
</html>
