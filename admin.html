<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    padding: 20px 10px;
    background:#f5f7fa;
    font-family:Arial;
    max-width: 100vw;
    overflow-x: hidden;
  }
  .login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
    width: 90%;
  }
  .login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
  }
  .login button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
  }
  .container{
    display:none;
    max-width: none;
    width: 98%;
    margin: 0 auto;
    background:white;
    padding:20px 15px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
  }
  h1{
    margin-bottom:10px;
    text-align:center;
    font-size: 20px;
  }
  .search-tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-tools input{
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    width:200px;
  }
  .search-tools button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  .tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
  }
  button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  button.del-btn{background:#dc3545}
  button.exit-btn{background:#6c757d}
  .table-container{
    overflow-x: auto;
    margin:10px 0;
  }
  table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
  }
  th,td{
    border:1px solid #ddd;
    padding:8px 6px;
    text-align:center;
    white-space:nowrap;
    font-size:13px;
  }
  th{background:#f8f9fa}
  .id-col{width:80px}
  .time-col{width:150px}
  .name-col{width:80px}
  .phone-col{width:110px}
  .paytype-col{width:100px}
  .money-col{width:80px}
  .oper-col{width:80px}
  .class-col{width:120px}
  .remark-col{width:150px}
</style>
</head>

<body>
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <div class="search-tools">
    <input type="text" id="searchName" placeholder="姓名查询">
    <input type="text" id="searchPhone" placeholder="电话查询">
    <button onclick="searchOrders()">查询</button>
    <button onclick="resetSearch()">重置</button>
  </div>
  <div class="tools">
    <button onclick="load()">刷新</button>
    <button onclick="exportExcel()">导出Excel</button>
    <button class="exit-btn" onclick="logout()">退出</button>
  </div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="id-col">订单ID</th>
          <th class="name-col">姓名</th>
          <th class="phone-col">电话</th>
          <th class="paytype-col">支付方式</th>
          <th class="money-col">金额</th>
          <th class="time-col">提交时间</th>
          <th class="class-col">4月11日早送</th>
          <th class="class-col">4月11日晚接</th>
          <th class="class-col">4月12日早送</th>
          <th class="class-col">4月12日晚接</th>
          <th class="class-col">4月11日中午更换</th>
          <th class="class-col">4月12日中午更换</th>
          <th class="oper-col">操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";
let orderData = [];
let filteredOrderData = [];

// 登录
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){alert('密码错误');return}
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出
function logout(){
  if(confirm('确定退出？')){
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
  }
}

// 加载订单
async function load() {
  try {
    const res = await fetch(`${SERVER_URL}/api/getAllOrders?pwd=${PWD}`);
    const data = await res.json();
    if(data.code !== 0) { alert(data.msg); return; }
    orderData = data.data;
    filteredOrderData = [...orderData];
    renderTable();
  } catch (err) {
    alert('加载失败');
  }
}

// 渲染表格
function renderTable() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if(filteredOrderData.length === 0) {
    list.innerHTML = '<tr><td colspan="13">暂无数据</td></tr>';
    return;
  }
  filteredOrderData.forEach(order => {
    const tr = document.createElement('tr');
    const getClass = (name) => {
      const item = order.carList.find(i => i.name === name);
      if(!item) return '-';
      if(item.school) return item.school;
      if(item.from && item.to) return `${item.from}→${item.to}`;
      return '-';
    };
    tr.innerHTML = `
      <td>${order.orderId}</td>
      <td>${order.userName}</td>
      <td>${order.userPhone}</td>
      <td>${order.payType}</td>
      <td>${order.total}</td>
      <td>${order.createTime}</td>
      <td>${getClass('4月11日早送')}</td>
      <td>${getClass('4月11日晚接')}</td>
      <td>${getClass('4月12日早送')}</td>
      <td>${getClass('4月12日晚接')}</td>
      <td>${getClass('4月11日中午考点更换')}</td>
      <td>${getClass('4月12日中午考点更换')}</td>
      <td><button class="del-btn" onclick="deleteOrder('${order._id}')">删除</button></td>
    `;
    list.appendChild(tr);
  });
}

// 删除订单
async function deleteOrder(id) {
  if(!confirm('确定删除？')) return;
  try {
    const res = await fetch(`${SERVER_URL}/api/deleteOrder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: PWD, id })
    });
    const data = await res.json();
    alert(data.msg);
    load();
  } catch (err) {
    alert('删除失败');
  }
}

// 搜索
function searchOrders() {
  const name = document.getElementById('searchName').value.trim();
  const phone = document.getElementById('searchPhone').value.trim();
  filteredOrderData = orderData.filter(o =>
    (o.userName || '').includes(name) && (o.userPhone || '').includes(phone)
  );
  renderTable();
}

// 重置
function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = [...orderData];
  renderTable();
}

// 导出Excel
function exportExcel() {
  if(filteredOrderData.length === 0) { alert('无数据'); return; }
  const excel = filteredOrderData.map(o => {
    const get = (n) => {
      const i = o.carList.find(x=>x.name===n);
      if(!i) return '-';
      if(i.school) return i.school;
      if(i.from&&i.to) return i.from+'→'+i.to;
      return '-';
    };
    return {
      订单ID:o.orderId,姓名:o.userName,电话:o.userPhone,支付方式:o.payType,
      金额:o.total,提交时间:o.createTime,
      4月11日早送:get('4月11日早送'),
      4月11日晚接:get('4月11日晚接'),
      4月12日早送:get('4月12日早送'),
      4月12日晚接:get('4月12日晚接'),
      4月11日中午更换:get('4月11日中午考点更换'),
      4月12日中午更换:get('4月12日中午考点更换')
    };
  });
  const ws = XLSX.utils.json_to_sheet(excel);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'订单');
  XLSX.writeFile(wb,'订单列表.xlsx');
}
</script>
</body>
</html>
