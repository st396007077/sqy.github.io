<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    padding: 20px 10px;
    background:#f5f7fa;
    font-family:Arial;
    max-width: 100vw;
    overflow-x: hidden;
  }
  .login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
    width: 90%;
  }
  .login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
  }
  .login button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
  }
  .container{
    display:none;
    max-width: none;
    width: 98%;
    margin: 0 auto;
    background:white;
    padding:20px 15px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
  }
  h1{
    margin-bottom:10px;
    text-align:center;
    font-size: 20px;
  }
  /* 颜色说明样式 */
  .color-desc{
    margin-bottom:15px;
    padding:8px 10px;
    background:#f8f9fa;
    border-radius:5px;
    font-size:13px;
    color:#666;
    text-align: left; /* 左对齐 */
  }
  .color-desc span{
    display:inline-block;
    margin-right:15px;
  }
  .color-desc span i{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:2px;
    margin-right:5px;
    vertical-align:middle;
  }
  .color-normal i{background:white;border:1px solid #ddd;}
  .color-modified i{background:#cce5ff;}
  .color-multi i{background:#d4edda;}
  .color-repeat i{background:#f8d7da;}

  /* 查询工具样式 */
  .search-tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-tools input{
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    width:200px;
  }
  .search-tools button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }

  .tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
  }
  .tools-right{
    display:flex;
    gap:10px;
  }
  button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  button.del-btn{background:#dc3545}
  button.edit-btn{background:#28a745}
  button.exit-btn{background:#6c757d}
  
  .table-container{
    overflow-x: auto;
    margin: 10px 0;
    border-radius: 5px;
    box-shadow: 0 1px 3px #00000010;
    width: 100%;
  }
  table{
    width: 100%;
    min-width: 1200px;
    border-collapse: collapse;
  }
  th,td{
    border:1px solid #ddd;
    padding: 8px 6px;
    text-align: center;
    white-space: nowrap;
  }
  th{
    background:#f8f9fa;
    font-size: 14px;
  }
  td{
    font-size: 13px;
  }
  .id-col{width: 80px !important;}
  .time-col{width: 150px !important;}
  .name-col{width: 80px !important;}
  .phone-col{width: 110px !important;}
  .paytype-col{width: 100px !important;}
  .money-col{width: 80px !important;}
  .oper-col{width: 120px !important;} /* 加宽操作列 */
  .class-col{width: 120px !important;}
  .remark-col{width: 150px !important;} /* 备注列宽度 */
  .empty-cell{color: #999;}

  /* 行颜色样式 */
  .row-modified{background-color: #cce5ff !important;} /* 蓝色：修改过 */
  .row-multi{background-color: #d4edda !important;} /* 绿色：多次提交 */
  .row-repeat{background-color: #f8d7da !important;} /* 红色：重复班次 */

  /* 弹窗样式 */
  .modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
  }
  .modal-content{
    background:white;
    padding:20px;
    border-radius:8px;
    width:90%;
    max-width:800px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
  }
  .form-group{
    margin-bottom:15px;
  }
  .form-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    font-weight:500;
  }
  .form-group input, .form-group select{
    width:100%;
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    font-size:14px;
  }
  .class-editor{
    border:1px solid #ddd;
    border-radius:5px;
    padding:10px;
    margin-bottom:15px;
  }
  .class-item{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
    padding:8px;
    background:#f8f9fa;
    border-radius:4px;
  }
  /* 考点更换特殊处理：双下拉框 */
  .class-item.double-select {
    flex-wrap: wrap;
  }
  .class-item.double-select .select-group {
    flex: 1;
    min-width: 150px;
    margin-bottom: 5px;
  }
  .class-item.double-select .select-group label {
    font-size: 12px;
    margin-bottom: 3px;
    color: #666;
  }
  .class-item select{
    flex:1;
    padding:6px;
  }
  .class-item button{
    padding:6px 10px;
    background:#dc3545;
    font-size:12px;
    white-space: nowrap;
  }
  .add-class-btn{
    padding:6px 10px;
    background:#28a745;
    font-size:12px;
    margin-bottom:10px;
  }
  .modal-footer{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:20px;
  }
  .modal-footer button{
    padding:8px 20px;
  }
  .cancel-btn{
    background:#6c757d;
  }

  @media (max-width: 768px) {
    .container{
      width: 99%;
      padding: 15px 10px;
    }
    .tools, .search-tools{
      flex-direction: column;
      align-items: flex-start;
    }
    .tools-right, .search-tools button{
      margin-top: 10px;
      width: 100%;
      justify-content: flex-end;
    }
    .search-tools input{
      width: 100%;
    }
    .class-item {
      flex-wrap: wrap;
    }
    .class-item select {
      width: 100%;
      margin-bottom: 5px;
    }
    .class-item button {
      width: 100%;
    }
  }
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<!-- 管理界面 -->
<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <!-- 颜色说明（左对齐） -->
  <div class="color-desc">
    <span class="color-normal"><i></i>白色：正常</span>
    <span class="color-modified"><i></i>蓝色：修改过</span>
    <span class="color-multi"><i></i>绿色：多次提交</span>
    <span class="color-repeat"><i></i>红色：重复提交同一班次</span>
  </div>
  
  <!-- 查询工具：姓名/电话模糊查询 -->
  <div class="search-tools">
    <input type="text" id="searchName" placeholder="请输入姓名查询（模糊匹配）">
    <input type="text" id="searchPhone" placeholder="请输入联系电话查询（模糊匹配）">
    <button onclick="searchOrders()">查询</button>
    <button onclick="resetSearch()">重置</button>
  </div>

  <div class="tools">
    <div class="tools-left">
      <button onclick="load()">刷新</button>
      <button onclick="exportExcel()">导出 Excel</button>
    </div>
    <div class="tools-right">
      <button class="exit-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  
  <!-- 表格容器 -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="id-col">订单ID</th>
          <th class="name-col">姓名</th>
          <th class="phone-col">联系电话</th>
          <th class="paytype-col">支付方式</th>
          <th class="money-col">金额(元)</th>
          <th class="time-col">提交时间</th>
          <th class="class-col">4月11日早送</th>
          <th class="class-col">4月11日晚接</th>
          <th class="class-col">4月12日早送</th>
          <th class="class-col">4月12日晚接</th>
          <th class="class-col">4月11日中午考点更换</th>
          <th class="class-col">4月12日中午考点更换</th>
          <th class="remark-col">备注</th> <!-- 新增备注列 -->
          <th class="oper-col">操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<!-- 修改弹窗 -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-title">修改订单信息</div>
    <input type="hidden" id="editOrderId">
    <div class="form-group">
      <label>姓名 <span style="color:red">*</span></label>
      <input type="text" id="editName" placeholder="请输入2-5个汉字的真实姓名">
    </div>
    <div class="form-group">
      <label>联系电话 <span style="color:red">*</span></label>
      <input type="tel" id="editPhone" placeholder="请输入11位手机号码" maxlength="11">
    </div>
    <div class="form-group">
      <label>乘坐班次</label>
      <div class="class-editor">
        <button class="add-class-btn" onclick="addClassItem()">添加班次</button>
        <div id="classItemsContainer"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeEditModal()">取消</button>
      <button onclick="saveEditOrder()">确定</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
// 替换为你的Render后端地址
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";

let orderData = []; // 原始订单数据
let filteredOrderData = []; // 筛选后的订单数据

// 班次列表（与前端保持一致）
const classTypes = [
  "4月11日早送",
  "4月11日晚接",
  "4月12日早送",
  "4月12日晚接",
  "4月11日中午考点更换",
  "4月12日中午考点更换"
];

// 学校列表（与前端保持一致）
const schoolList = [
  "XX职业技术学院", 
  "XX师范大学", 
  "XX理工学院", 
  "XX财经大学"
];

// 验证姓名（2-5个汉字）
function validateName(name) {
  const reg = /^[\u4e00-\u9fa5]{2,5}$/;
  return reg.test(name);
}

// 验证手机号码
function validatePhone(phone) {
  const reg = /^1[3-9]\d{9}$/;
  return reg.test(phone);
}

// 登录
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){alert('密码错误');return}
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出登录
function logout(){
  if(confirm('确定要退出登录吗？')){
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
    document.getElementById('pwd').value = '';
    orderData = [];
    filteredOrderData = [];
  }
}

// 解析班次数据（适配考点更换的双学校格式）
function parseClassData(carList) {
  const classMap = {
    "4月11日早送": "-",
    "4月11日晚接": "-",
    "4月12日早送": "-",
    "4月12日晚接": "-",
    "4月11日中午考点更换": "-",
    "4月12日中午考点更换": "-"
  };

  carList.forEach(item => {
    const className = item.name;
    let content = "-";
    if(item.school) {
      content = item.school;
    } else if(item.from && item.to) {
      content = `${item.from}→${item.to}`;
    }
    // 重复班次只保留第一个（避免表格单元格重复显示）
    if(classMap[className] === "-") {
      classMap[className] = content;
    }
  });

  return classMap;
}

// 检测重复数据和重复班次（核心逻辑）
function processOrderData(orders) {
  // 1. 按姓名+电话分组（空值不参与分组）
  const groupMap = {};
  orders.forEach(order => {
    const name = (order.userName || '').trim();
    const phone = (order.userPhone || '').trim();
    if(!name || !phone) {
      // 姓名/电话为空的订单不合并，单独处理
      const key = `empty_${order.id}`;
      groupMap[key] = [order];
      return;
    }
    const key = `${name}_${phone}`;
    if(!groupMap[key]) {
      groupMap[key] = [];
    }
    groupMap[key].push(order);
  });

  const processedOrders = [];
  
  // 2. 处理每组数据
  Object.values(groupMap).forEach(group => {
    if(group.length === 1) {
      // 单条数据：检测是否有重复班次
      const order = { ...group[0] };
      const classNames = order.carList.map(item => item.name);
      // 检测是否有重复班次（同一班次出现多次）
      const hasRepeatClass = classNames.some((name, index) => classNames.indexOf(name) !== index);
      
      // 设置备注和行样式
      if(hasRepeatClass) {
        order.remark = "重复提交同一班次";
        order.rowClass = "row-repeat"; // 红色
      } else {
        order.remark = order.remark || ""; // 保留原有备注（如修改后的备注）
        order.rowClass = order.rowClass || ""; // 保留原有样式（如修改后的蓝色）
      }
      processedOrders.push(order);
    } else {
      // 多条数据：合并为一行
      const firstOrder = { ...group[0] };
      // 合并所有班次
      const allCarList = [];
      const classNames = [];
      let hasRepeatClass = false;
      
      group.forEach(order => {
        order.carList.forEach(item => {
          allCarList.push(item);
          // 检测是否有重复班次
          if(classNames.includes(item.name)) {
            hasRepeatClass = true;
          }
          classNames.push(item.name);
        });
      });

      // 构建合并后的订单
      const mergedOrder = {
        ...firstOrder,
        carList: allCarList,
        mergedOrders: group, // 保存合并的原始订单ID
        // 备注和样式
        remark: hasRepeatClass ? "重复提交同一班次" : "第二次及之后的提交内容",
        rowClass: hasRepeatClass ? "row-repeat" : "row-multi" // 红色/绿色
      };
      processedOrders.push(mergedOrder);
    }
  });

  return processedOrders;
}

// 加载订单
function load(){
  const url = `${SERVER_URL}/api/getAllOrders?pwd=${encodeURIComponent(PWD)}`;
  
  fetch(url)
  .then(res=>{
    if(!res.ok) throw new Error(`接口请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      orderData = res.data;
      // 处理数据（合并、检测重复、设置样式）
      const processedData = processOrderData(orderData);
      filteredOrderData = processedData;
      renderOrderList(filteredOrderData);
    }else if(res.code===-2){
      alert('密码错误，请重新登录');
      logout();
    }else{
      alert(`加载失败：${res.msg || '未知错误'}`);
    }
  }).catch(err=>{
    console.error('加载订单失败：', err);
    alert(`加载订单失败：${err.message || '请检查后端服务是否正常'}`);
  });
}

// 渲染订单列表
function renderOrderList(orders) {
  let html = '';
  if(orders.length === 0) {
    html = '<tr><td colspan="14" style="text-align:center;color:#999">暂无订单数据</td></tr>';
  } else {
    orders.forEach(item=>{
      const classData = parseClassData(item.carList || []);
      // 渲染行（带样式和备注）
      html += `
        <tr data-order-id="${item.id}" class="${item.rowClass || ''}">
          <td class="id-col">${item.orderId || item.id || '-'}</td>
          <td class="name-col">${item.userName || '-'}</td>
          <td class="phone-col">${item.userPhone || '-'}</td>
          <td class="paytype-col">${item.payType || '-'}</td>
          <td class="money-col">${item.total || 0}</td>
          <td class="time-col">${item.createTime || '-'}</td>
          <td class="class-col ${classData['4月11日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月11日早送']}</td>
          <td class="class-col ${classData['4月11日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月11日晚接']}</td>
          <td class="class-col ${classData['4月12日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月12日早送']}</td>
          <td class="class-col ${classData['4月12日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月12日晚接']}</td>
          <td class="class-col ${classData['4月11日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月11日中午考点更换']}</td>
          <td class="class-col ${classData['4月12日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月12日中午考点更换']}</td>
          <td class="remark-col">${item.remark || '-'}</td>
          <td class="oper-col">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">修改</button>
            <button class="del-btn" onclick="deleteOrder('${item.id}')">删除</button>
          </td>
        </tr>
      `;
    });
  }
  document.getElementById('list').innerHTML = html;
}

// 查询订单（姓名/电话模糊匹配）
function searchOrders() {
  const name = document.getElementById('searchName').value.trim().toLowerCase();
  const phone = document.getElementById('searchPhone').value.trim();
  
  if(!name && !phone) {
    // 无查询条件：显示全部
    filteredOrderData = processOrderData(orderData);
    renderOrderList(filteredOrderData);
    return;
  }

  // 筛选逻辑：姓名包含 或 电话包含（模糊匹配）
  const filtered = filteredOrderData.filter(order => {
    const orderName = (order.userName || '').toLowerCase();
    const orderPhone = order.userPhone || '';
    return (name ? orderName.includes(name) : true) && (phone ? orderPhone.includes(phone) : true);
  });

  renderOrderList(filtered);
}

// 重置查询
function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = processOrderData(orderData);
  renderOrderList(filteredOrderData);
}

// 打开修改弹窗
function openEditModal(orderId) {
  // 查找订单（兼容合并订单）
  let order = orderData.find(item => item.id === orderId);
  // 如果是合并订单，取第一个原始订单
  if(!order && filteredOrderData.some(item => item.mergedOrders)) {
    const mergedOrder = filteredOrderData.find(item => item.mergedOrders && item.mergedOrders.some(o => o.id === orderId));
    if(mergedOrder) order = mergedOrder.mergedOrders[0];
  }
  
  if(!order) {
    alert('订单不存在');
    return;
  }

  // 填充表单
  document.getElementById('editOrderId').value = orderId;
  document.getElementById('editName').value = order.userName || '';
  document.getElementById('editPhone').value = order.userPhone || '';

  // 渲染班次编辑项
  const container = document.getElementById('classItemsContainer');
  container.innerHTML = '';
  
  // 现有班次
  (order.carList || []).forEach((item, index) => {
    const isDoubleSelect = item.name.includes('考点更换'); // 考点更换显示双下拉
    let schoolValue = item.school || '';
    let fromSchool = '';
    let toSchool = '';
    if(item.from && item.to) {
      fromSchool = item.from;
      toSchool = item.to;
    }
    addClassItemToContainer(item.name, schoolValue, fromSchool, toSchool, index, isDoubleSelect);
  });
  
  // 如果没有班次，添加一个默认的
  if((order.carList || []).length === 0) {
    addClassItemToContainer(classTypes[0], schoolList[0], '', '', 0, false);
  }

  // 显示弹窗
  document.getElementById('editModal').style.display = 'flex';
}

// 添加班次项到容器（适配考点更换的双下拉）
function addClassItemToContainer(classType, school, fromSchool, toSchool, index, isDoubleSelect) {
  const container = document.getElementById('classItemsContainer');
  const item = document.createElement('div');
  item.className = `class-item ${isDoubleSelect ? 'double-select' : ''}`;
  item.dataset.index = index;
  
  // 班次选择下拉
  const classSelect = document.createElement('select');
  classSelect.innerHTML = classTypes.map(type => `<option value="${type}" ${type === classType ? 'selected' : ''}>${type}</option>`).join('');
  // 监听班次类型变化，自动切换单/双下拉
  classSelect.onchange = function() {
    const newType = this.value;
    const isNewDouble = newType.includes('考点更换');
    // 重新渲染当前项
    const currentIndex = item.dataset.index;
    container.removeChild(item);
    addClassItemToContainer(newType, '', '', '', currentIndex, isNewDouble);
  };

  if(!isDoubleSelect) {
    // 普通班次：单下拉
    const schoolSelect = document.createElement('select');
    schoolSelect.innerHTML = schoolList.map(schoolItem => `<option value="${schoolItem}" ${schoolItem === school ? 'selected' : ''}>${schoolItem}</option>`).join('');
    
    // 删除按钮
    const delBtn = document.createElement('button');
    delBtn.innerText = '删除';
    delBtn.onclick = function() {
      container.removeChild(item);
    };

    item.appendChild(classSelect);
    item.appendChild(schoolSelect);
    item.appendChild(delBtn);
  } else {
    // 考点更换：双下拉（出发+送达）
    item.appendChild(classSelect);
    
    // 出发学校
    const fromGroup = document.createElement('div');
    fromGroup.className = 'select-group';
    fromGroup.innerHTML = `<label>出发学校</label>`;
    const fromSelect = document.createElement('select');
    fromSelect.innerHTML = schoolList.map(schoolItem => `<option value="${schoolItem}" ${schoolItem === fromSchool ? 'selected' : ''}>${schoolItem}</option>`).join('');
    fromGroup.appendChild(fromSelect);
    item.appendChild(fromGroup);

    // 送达学校
    const toGroup = document.createElement('div');
    toGroup.className = 'select-group';
    toGroup.innerHTML = `<label>送达学校</label>`;
    const toSelect = document.createElement('select');
    toSelect.innerHTML = schoolList.map(schoolItem => `<option value="${schoolItem}" ${schoolItem === toSchool ? 'selected' : ''}>${schoolItem}</option>`).join('');
    toGroup.appendChild(toSelect);
    item.appendChild(toGroup);

    // 删除按钮
    const delBtn = document.createElement('button');
    delBtn.innerText = '删除';
    delBtn.onclick = function() {
      container.removeChild(item);
    };
    item.appendChild(delBtn);
  }

  container.appendChild(item);
}

// 添加新的班次项
function addClassItem() {
  const container = document.getElementById('classItemsContainer');
  const index = container.children.length;
  // 默认添加第一个班次（单下拉）
  addClassItemToContainer(classTypes[0], schoolList[0], '', '', index, false);
}

// 关闭修改弹窗
function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  // 清空表单
  document.getElementById('editOrderId').value = '';
  document.getElementById('editName').value = '';
  document.getElementById('editPhone').value = '';
  document.getElementById('classItemsContainer').innerHTML = '';
}

// 保存修改的订单（修复后）
function saveEditOrder() {
  const orderId = document.getElementById('editOrderId').value;
  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  
  // 验证姓名
  if(!name) {
    alert('姓名不能为空');
    return;
  }
  if(!validateName(name)) {
    alert('请输入2-5个有效的汉字姓名');
    return;
  }

  // 验证电话
  if(!phone) {
    alert('联系电话不能为空');
    return;
  }
  if(!validatePhone(phone)) {
    alert('请输入有效的11位手机号码');
    return;
  }

  // 收集班次数据（修复核心：增加空值判断）
  const classItems = document.querySelectorAll('#classItemsContainer .class-item');
  if(classItems.length === 0) {
    alert('请至少选择一个乘坐班次');
    return;
  }

  const carList = [];
  classItems.forEach(item => {
    // 第一步：获取班次类型下拉框（必选，先判断是否存在）
    const classSelect = item.querySelector('select:first-child');
    if (!classSelect) return; // 无班次下拉框则跳过
    const classType = classSelect.value;
    const isDoubleSelect = item.classList.contains('double-select');
    
    if(!isDoubleSelect) {
      // 普通班次：单学校（增加空值判断）
      const schoolSelect = item.querySelector('select:nth-child(2)');
      if (!schoolSelect) return; // 无学校下拉框则跳过
      const school = schoolSelect.value;
      carList.push({
        name: classType,
        school: school,
        price: classType.includes('考点更换') ? 3 : 20 // 匹配前端价格
      });
    } else {
      // 考点更换：双学校（增加空值判断）
      const fromGroup = item.querySelector('.select-group:first-child');
      const toGroup = item.querySelector('.select-group:last-child');
      if (!fromGroup || !toGroup) return; // 无分组则跳过
      
      const fromSelect = fromGroup.querySelector('select');
      const toSelect = toGroup.querySelector('select');
      if (!fromSelect || !toSelect) return; // 无下拉框则跳过
      
      const fromSchool = fromSelect.value;
      const toSchool = toSelect.value;
      carList.push({
        name: classType,
        from: fromSchool,
        to: toSchool,
        price: 3 // 考点更换固定3元
      });
    }
  });

  // 二次校验：确保收集到有效班次
  if (carList.length === 0) {
    alert('请选择有效的乘坐班次信息');
    return;
  }

  // 计算总金额
  const total = carList.reduce((sum, item) => sum + Number(item.price), 0);

  // 构建修改数据
  const editData = {
    pwd: PWD,
    id: orderId,
    userName: name,
    userPhone: phone,
    carList: carList,
    total: total,
    remark: "已修改", // 备注改为“已修改”
    rowClass: "row-modified" // 行样式改为蓝色
  };

  // 提交修改（后续代码不变）
  fetch(`${SERVER_URL}/api/updateOrder`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(editData)
  })
  .then(res=>{
    if(!res.ok) throw new Error(`修改请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      alert('修改成功！');
      closeEditModal();
      load(); // 重新加载数据
    }else if(res.code===-2){
      alert('密码错误，修改失败');
      logout();
    }else{
      alert(`修改失败：${res.msg || '订单不存在'}`);
    }
  })
  .catch(err=>{
    console.error('修改订单失败：', err);
    alert(`修改失败：${err.message || '请检查后端接口是否正常'}`);
  });
}

// 删除订单
function deleteOrder(orderId){
  if(!orderId || !confirm(`确定要删除订单【${orderId}】吗？此操作不可恢复！`)){
    return;
  }

  fetch(`${SERVER_URL}/api/deleteOrder`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ 
      pwd: PWD,
      id: orderId
    })
  })
  .then(res=>{
    if(!res.ok) throw new Error(`删除请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      alert('删除成功！');
      load();
    }else if(res.code===-2){
      alert('密码错误，删除失败');
      logout();
    }else{
      alert(`删除失败：${res.msg || '订单不存在'}`);
    }
  })
  .catch(err=>{
    console.error('删除订单失败：', err);
    alert(`删除失败：${err.message || '请检查后端接口是否正常'}`);
  });
}

// 导出Excel
function exportExcel(){
  if(filteredOrderData.length === 0){
    alert('暂无订单数据可导出');
    return;
  }
  const header = [
    '订单ID', '姓名', '联系电话', '支付方式', '金额(元)', '提交时间',
    '4月11日早送', '4月11日晚接', '4月12日早送',
    '4月12日晚接', '4月11日中午考点更换',
    '4月12日中午考点更换', '备注'
  ];
  const data = [header];
  
  filteredOrderData.forEach(item=>{
    const classData = parseClassData(item.carList || []);
    data.push([
      item.orderId || item.id || '-',
      item.userName || '-',
      item.userPhone || '-',
      item.payType || '-',
      item.total || 0,
      item.createTime || '-',
      classData['4月11日早送'],
      classData['4月11日晚接'],
      classData['4月12日早送'],
      classData['4月12日晚接'],
      classData['4月11日中午考点更换'],
      classData['4月12日中午考点更换'],
      item.remark || '-'
    ]);
  });
  
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "订单列表");
  XLSX.writeFile(wb, `订单列表_${new Date().toLocaleDateString()}.xlsx`);
}
